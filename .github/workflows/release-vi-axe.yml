name: release-vi-axe

on:
  workflow_dispatch:
    inputs:
      versionBump:
        description: "Semantic version segment to increment"
        required: false
        default: patch
        type: choice
        options:
          - major
          - minor
          - patch

permissions:
  contents: write # push branch and create tags
  pull-requests: write # create pull requests
  id-token: write # npm trusted publisher (OIDC provenance)

jobs:
  release-vi-axe:
    runs-on: ubuntu-latest
    steps:
      # Use a PAT (RELEASE_WORKFLOW_TOKEN) so push/PR events trigger CI; the default
      # GITHUB_TOKEN does not. Add the secret under Settings → Secrets and variables → Actions.
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history needed for git log since last tag
          token: ${{ secrets.RELEASE_WORKFLOW_TOKEN }}

      - name: Check for unreleased commits
        id: check
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LATEST_TAG" ]; then
            git log --pretty=format:"- %s" -- packages/vi-axe/ | head -20 > /tmp/commits.txt
          else
            git log "$LATEST_TAG"..HEAD --pretty=format:"- %s" -- packages/vi-axe/ > /tmp/commits.txt
          fi
          echo "latest-tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"
          if [ -s /tmp/commits.txt ]; then
            echo "has-commits=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-commits=false" >> "$GITHUB_OUTPUT"
            echo "No new commits since ${LATEST_TAG:-the beginning} — skipping release"
          fi

      - name: Bump version
        if: steps.check.outputs.has-commits == 'true'
        id: version
        env:
          VERSION_BUMP: ${{ inputs.versionBump }}
        run: |
          CURRENT=$(node -p "require('./packages/vi-axe/package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "${VERSION_BUMP:-patch}" in
            major) NEW="$((MAJOR + 1)).0.0" ;;
            minor) NEW="$MAJOR.$((MINOR + 1)).0" ;;
            patch) NEW="$MAJOR.$MINOR.$((PATCH + 1))" ;;
            *)
              echo "::error::Invalid versionBump '$VERSION_BUMP'. Expected major, minor, or patch." >&2
              exit 1
              ;;
          esac
          node -e "
            const fs = require('fs');
            const p = './packages/vi-axe/package.json';
            const pkg = JSON.parse(fs.readFileSync(p, 'utf8'));
            pkg.version = '$NEW';
            fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "new-version=$NEW" >> "$GITHUB_OUTPUT"
          echo "Bumping $CURRENT → $NEW"

      - name: Update CHANGELOG
        if: steps.check.outputs.has-commits == 'true'
        run: |
          NEW_VERSION="${{ steps.version.outputs.new-version }}"
          DATE=$(date +%Y-%m-%d)
          {
            printf "# %s (%s)\n\n" "$NEW_VERSION" "$DATE"
            cat /tmp/commits.txt
            printf "\n\n"
            cat packages/vi-axe/CHANGELOG.md
          } > /tmp/new-changelog.md
          mv /tmp/new-changelog.md packages/vi-axe/CHANGELOG.md

      - name: Create release PR
        if: steps.check.outputs.has-commits == 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_WORKFLOW_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          NEW_VERSION="${{ steps.version.outputs.new-version }}"
          BRANCH="release-vi-axe/v$NEW_VERSION"
          git checkout -b "$BRANCH"
          git add packages/vi-axe/package.json packages/vi-axe/CHANGELOG.md
          git commit -m "chore: release vi-axe v$NEW_VERSION"
          git push origin "$BRANCH" --force
          # Create PR if one doesn't already exist for this branch
          if ! gh pr view "$BRANCH" --json state -q '.state' 2>/dev/null | grep -q OPEN; then
            gh pr create \
              --title "chore: release vi-axe v$NEW_VERSION" \
              --body-file /tmp/commits.txt \
              --base main \
              --head "$BRANCH"
          fi
          # Enable auto-merge if the repo has it turned on
          gh pr merge "$BRANCH" --auto --squash || true
